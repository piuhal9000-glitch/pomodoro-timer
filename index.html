<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Focus — Pomodoro Timer</title>
  <style>
    :root {
      --text: #f7f7fb;
      --muted: rgba(255, 255, 255, 0.66);
      --panel: rgba(18, 22, 34, 0.58);
      --panel-strong: rgba(20, 24, 38, 0.78);
      --line: rgba(255, 255, 255, 0.12);
      --accent: #ff5c5c;
      --accent-2: #ff8a65;
      --success: #5ee6a8;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.34);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --overlay: 0.38;
      --glass-blur: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #080b13;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "SF Pro Text", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 94, 98, 0.32), transparent 36%),
        radial-gradient(circle at 88% 18%, rgba(83, 136, 255, 0.30), transparent 33%),
        linear-gradient(145deg, #111827 0%, #0b1020 48%, #080a11 100%);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(4, 7, 14, var(--overlay));
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      pointer-events: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08));
      border: 1px solid var(--line);
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand-mark svg {
      width: 23px;
      height: 23px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
      font-weight: 720;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .background-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid var(--line);
      border-radius: 14px;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .button:active {
      transform: scale(0.98);
    }

    .button svg {
      width: 18px;
      height: 18px;
    }

    .button.small {
      min-height: 38px;
      padding: 0 13px;
      font-size: 0.85rem;
    }

    .button.danger {
      color: #ffd8d8;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(330px, 0.72fr);
      gap: 22px;
      align-items: start;
    }

    .main-column,
    .side-column {
      display: grid;
      gap: 22px;
    }

    .glass {
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.115),
        rgba(255, 255, 255, 0.055)
      );
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }

    .timer-card {
      position: relative;
      overflow: hidden;
      min-height: 570px;
      padding: 30px;
      border-radius: var(--radius-xl);
    }

    .timer-card::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      right: -160px;
      bottom: -180px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 38%, transparent), transparent 67%);
      filter: blur(10px);
      pointer-events: none;
    }

    .phase-tabs {
      position: relative;
      z-index: 1;
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      border-radius: 17px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .phase-tab {
      padding: 10px 15px;
      border-radius: 13px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 180ms ease;
      font-size: 0.89rem;
      font-weight: 650;
    }

    .phase-tab.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .timer-center {
      position: relative;
      z-index: 1;
      min-height: 440px;
      display: grid;
      place-items: center;
      align-content: center;
      text-align: center;
      padding: 24px 0 6px;
    }

    .session-label {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.93rem;
      letter-spacing: 0.02em;
    }

    .timer {
      margin: 0;
      font-size: clamp(5.6rem, 12vw, 10rem);
      line-height: 0.92;
      letter-spacing: -0.075em;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 15px 50px rgba(0, 0, 0, 0.26);
    }

    .progress-track {
      width: min(520px, 86%);
      height: 7px;
      margin: 26px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 350ms linear;
      box-shadow: 0 0 24px color-mix(in srgb, var(--accent) 65%, transparent);
    }

    .timer-status {
      min-height: 22px;
      margin: 15px 0 0;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .timer-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .control {
      min-width: 54px;
      height: 54px;
      padding: 0 18px;
      border-radius: 18px;
      color: #fff;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.13);
      cursor: pointer;
      transition: transform 170ms ease, background 170ms ease;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .control:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.17);
    }

    .control.primary {
      min-width: 152px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      box-shadow: 0 15px 42px color-mix(in srgb, var(--accent) 34%, transparent);
      font-weight: 760;
    }

    .control svg {
      width: 19px;
      height: 19px;
      vertical-align: -4px;
      margin-right: 6px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 22px;
      border-radius: var(--radius-lg);
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .stat-icon svg {
      width: 18px;
      height: 18px;
    }

    .stat-title {
      margin: 0;
      color: var(--muted);
      font-size: 0.87rem;
    }

    .stat-value {
      margin: 17px 0 0;
      font-size: clamp(1.55rem, 2.5vw, 2.15rem);
      letter-spacing: -0.04em;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .stat-note {
      margin: 6px 0 0;
      color: rgba(255, 255, 255, 0.48);
      font-size: 0.78rem;
    }

    .section-card {
      padding: 24px;
      border-radius: var(--radius-lg);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .section-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .field input[type="number"],
    .field input[type="range"] {
      width: 100%;
    }

    .number-input {
      min-height: 46px;
      padding: 0 14px;
      color: var(--text);
      background: rgba(4, 7, 14, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      outline: none;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .number-input:focus {
      border-color: color-mix(in srgb, var(--accent) 65%, white 10%);
      background: rgba(4, 7, 14, 0.38);
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 48px;
      padding: 0 2px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 28px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.10);
      cursor: pointer;
      transition: background 180ms ease;
    }

    .switch span::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.30);
      transition: transform 180ms ease;
    }

    .switch input:checked + span {
      background: var(--accent);
    }

    .switch input:checked + span::after {
      transform: translateX(20px);
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .save-state {
      color: var(--success);
      font-size: 0.78rem;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .save-state.show {
      opacity: 1;
    }

    .log-card {
      min-height: 330px;
    }

    .log-list {
      display: grid;
      gap: 10px;
      max-height: 425px;
      overflow: auto;
      padding-right: 3px;
    }

    .log-list::-webkit-scrollbar {
      width: 8px;
    }

    .log-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 999px;
    }

    .log-item {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border-radius: 16px;
      background: rgba(3, 6, 12, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .log-index {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.10);
      font-size: 0.82rem;
      font-weight: 720;
    }

    .log-main {
      min-width: 0;
    }

    .log-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 680;
    }

    .log-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .log-duration {
      font-size: 0.81rem;
      color: rgba(255, 255, 255, 0.82);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      margin-left: 6px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      vertical-align: 1px;
    }

    .badge.complete {
      color: #bff9db;
      background: rgba(94, 230, 168, 0.13);
    }

    .badge.interrupted {
      color: #ffd1d1;
      background: rgba(255, 92, 92, 0.13);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 220px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.13);
      border-radius: 18px;
    }

    .empty-state svg {
      width: 34px;
      height: 34px;
      margin-bottom: 10px;
      opacity: 0.72;
    }

    .empty-state p {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .goal-wrap {
      margin-top: 18px;
      padding: 15px;
      border-radius: 17px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .goal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .goal-track {
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.11);
      overflow: hidden;
    }

    .goal-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 240ms ease;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      transform: translate(-50%, 18px);
      padding: 12px 16px;
      border-radius: 14px;
      color: #fff;
      background: rgba(18, 22, 34, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-size: 0.84rem;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .side-column {
        grid-template-columns: 1fr 1fr;
      }

      .log-card {
        min-height: auto;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 680px);
        padding-top: 16px;
      }

      .topbar {
        align-items: flex-start;
      }

      .brand p {
        display: none;
      }

      .button .label {
        display: none;
      }

      .button {
        width: 44px;
        padding: 0;
      }

      .timer-card {
        min-height: 510px;
        padding: 20px;
        border-radius: 28px;
      }

      .timer-center {
        min-height: 390px;
      }

      .timer {
        font-size: clamp(4.5rem, 23vw, 7rem);
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .stat-card {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0 14px;
        align-items: center;
      }

      .stat-top {
        grid-row: 1 / span 3;
      }

      .stat-value {
        margin-top: 0;
      }

      .side-column {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 490px) {
      .phase-tabs {
        width: 100%;
      }

      .phase-tab {
        flex: 1;
        padding-inline: 8px;
        font-size: 0.79rem;
      }

      .control.primary {
        min-width: 138px;
      }

      .settings-grid {
        grid-template-columns: 1fr;
      }

      .field.full {
        grid-column: auto;
      }

      .section-card {
        padding: 20px;
      }

      .log-item {
        grid-template-columns: 38px minmax(0, 1fr);
      }

      .log-duration {
        grid-column: 2;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="13" r="7.5" stroke="currentColor" stroke-width="1.7"/>
            <path d="M9.5 3.5h5M12 5.5V8M17.5 7.5l1.4-1.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>Focus</h1>
          <p>당신의 하루를 더 선명하게.</p>
        </div>
      </div>

      <div class="background-actions">
        <input id="backgroundInput" class="hidden" type="file" accept="image/*" />
        <button id="backgroundButton" class="button" type="button" title="배경 이미지 선택">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.7"/>
            <circle cx="9" cy="10" r="2" stroke="currentColor" stroke-width="1.7"/>
            <path d="m5.5 17 4.2-4.2a2 2 0 0 1 2.8 0l1.2 1.2 1.3-1.3a2 2 0 0 1 2.8 0l2.7 2.7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          <span class="label">배경 선택</span>
        </button>
        <button id="clearBackgroundButton" class="button danger hidden" type="button" title="배경 이미지 제거">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7h16M10 11v6M14 11v6M8 7l1-2h6l1 2M6.5 7l.8 13h9.4l.8-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="label">배경 제거</span>
        </button>
      </div>
    </header>

    <section class="layout">
      <div class="main-column">
        <section class="timer-card glass" aria-label="뽀모도로 타이머">
          <div class="phase-tabs" role="tablist" aria-label="세션 종류">
            <button class="phase-tab active" data-phase="focus" type="button">집중</button>
            <button class="phase-tab" data-phase="break" type="button">짧은 휴식</button>
            <button class="phase-tab" data-phase="longBreak" type="button">긴 휴식</button>
          </div>

          <div class="timer-center">
            <p id="sessionLabel" class="session-label">집중 세션 1</p>
            <p id="timerDisplay" class="timer" aria-live="polite">25:00</p>

            <div class="progress-track" aria-hidden="true">
              <div id="progressBar" class="progress-bar"></div>
            </div>

            <p id="timerStatus" class="timer-status">준비되면 시작하세요.</p>

            <div class="timer-controls">
              <button id="resetButton" class="control" type="button" title="현재 세션 초기화">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 4v6h6M5.4 15.5A8 8 0 1 0 6.2 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                초기화
              </button>

              <button id="startPauseButton" class="control primary" type="button">
                <span id="startPauseIcon">
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m9 7 8 5-8 5V7Z" fill="currentColor"/>
                  </svg>
                </span>
                <span id="startPauseText">시작</span>
              </button>

              <button id="skipButton" class="control" type="button" title="다음 세션으로 이동">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="m7 7 7 5-7 5V7ZM17 7v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                건너뛰기
              </button>

        <section class="stats-grid" aria-label="오늘의 집중 통계">
          <article class="stat-card glass">
            <div class="stat-top">
              <div class="stat-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7 4h10v4a5 5 0 0 1-10 0V4ZM9 19h6M12 13v6M17 6h3v2a4 4 0 0 1-4 4M7 6H4v2a4 4 0 0 0 4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <p class="stat-title">완료 세션</p>
            <p id="sessionCountValue" class="stat-value">0회</p>
            <p id="sessionGoalNote" class="stat-note">오늘 목표 8회</p>

          <article class="stat-card glass">
            <div class="stat-top">
              <div class="stat-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.7"/>
                  <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <p class="stat-title">총 집중시간</p>
            <p id="focusTimeValue" class="stat-value">0분</p>
            <p class="stat-note">실제로 집중한 시간</p>
          </article>

          <article class="stat-card glass">
            <div class="stat-top">
              <div class="stat-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 6v12M16 6v12" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
                </svg>
              </div>
            </div>
            <p class="stat-title">누적 멈춤 시간</p>
            <p id="pauseTimeValue" class="stat-value">0분</p>

      </div>

      <aside class="side-column">
        <section class="section-card glass">
          <div class="section-header">

              <h2>세션 설정</h2>
              <p>나에게 맞는 집중 리듬을 만드세요.</p>
            </div>

          <form id="settingsForm">
            <div class="settings-grid">
              <div class="field">
                <label for="focusMinutes">집중 시간 (분)</label>
                <input id="focusMinutes" class="number-input" type="number" min="1" max="180" value="25" />

              <div class="field">
                <label for="breakMinutes">짧은 휴식 (분)</label>
                <input id="breakMinutes" class="number-input" type="number" min="1" max="60" value="5" />

              <div class="field">
                <label for="longBreakMinutes">긴 휴식 (분)</label>
                <input id="longBreakMinutes" class="number-input" type="number" min="1" max="120" value="15" />
              </div>

              <div class="field">
                <label for="longBreakInterval">긴 휴식 주기 (세션)</label>
                <input id="longBreakInterval" class="number-input" type="number" min="2" max="12" value="4" />

              <div class="field">
                <label for="dailyGoal">오늘 목표 (세션)</label>
                <input id="dailyGoal" class="number-input" type="number" min="1" max="30" value="8" />
              </div>

              <div class="field">
                <label for="overlayRange">배경 어둡기</label>
                <input id="overlayRange" type="range" min="10" max="75" step="1" value="38" />

              <div class="field">
                <label for="glassBlurRange">창 유리 효과</label>
                <input id="glassBlurRange" type="range" min="0" max="40" step="1" value="18" />

              <div class="field full">
                <div class="switch-row">
                  <span>휴식 자동 시작</span>
                  <label class="switch">
                    <input id="autoStartBreak" type="checkbox" />
                    <span aria-hidden="true"></span>
                  </label>
                </div>
              </div>

              <div class="field full">
                <div class="switch-row">
                  <span>집중 자동 시작</span>
                  <label class="switch">
                    <input id="autoStartFocus" type="checkbox" />
                    <span aria-hidden="true"></span>
                  </label>
                </div>
              </div>

            <div class="goal-wrap">
              <div class="goal-top">
                <span>오늘 목표 진행률</span>
                <span id="goalText">0 / 8</span>
              </div>
              <div class="goal-track">
                <div id="goalBar" class="goal-bar"></div>
              </div>
            </div>

            <div class="settings-actions">
              <span id="saveState" class="save-state">저장됨</span>
              <button class="button small" type="submit">설정 저장</button>

        <section class="section-card glass log-card">
          <div class="section-header">
            <div>
              <h2>오늘의 세션 로그</h2>
              <p id="todayDateLabel"></p>
            </div>
            <button id="clearLogButton" class="button small danger" type="button">로그 비우기</button>
          </div>

          <div id="logList" class="log-list"></div>
        </section>
      </aside>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const STORAGE_KEY = "applePomodoroStateV1";
      const BG_KEY = "applePomodoroBackgroundV1";

      const defaultSettings = {
        focusMinutes: 25,
        breakMinutes: 5,
        longBreakMinutes: 15,
        longBreakInterval: 4,
        dailyGoal: 8,
        autoStartBreak: false,
        autoStartFocus: false,
        overlay: 38,
        glassBlur: 18
      };

      const phaseNames = {
        focus: "집중",
        break: "짧은 휴식",
        longBreak: "긴 휴식"
      };

      const phaseDurations = () => ({
        focus: state.settings.focusMinutes * 60,
        break: state.settings.breakMinutes * 60,
        longBreak: state.settings.longBreakMinutes * 60
      });

      const todayKey = () => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      };

      const defaultStats = () => ({
        date: todayKey(),
        completedSessions: 0,
        focusSeconds: 0,
        pauseSeconds: 0,
        logs: []
      });

      const state = {
        settings: { ...defaultSettings },
        stats: defaultStats(),
        phase: "focus",
        remaining: defaultSettings.focusMinutes * 60,
        isRunning: false,
        lastTick: null,
        pauseStartedAt: null,
        sessionStartedAt: null,
        currentSessionActiveSeconds: 0,
        timerId: null
      };

      const els = {
        timerDisplay: document.getElementById("timerDisplay"),
        progressBar: document.getElementById("progressBar"),
        sessionLabel: document.getElementById("sessionLabel"),
        timerStatus: document.getElementById("timerStatus"),
        startPauseButton: document.getElementById("startPauseButton"),
        startPauseText: document.getElementById("startPauseText"),
        startPauseIcon: document.getElementById("startPauseIcon"),
        resetButton: document.getElementById("resetButton"),
        skipButton: document.getElementById("skipButton"),
        phaseTabs: [...document.querySelectorAll(".phase-tab")],
        sessionCountValue: document.getElementById("sessionCountValue"),
        focusTimeValue: document.getElementById("focusTimeValue"),
        pauseTimeValue: document.getElementById("pauseTimeValue"),
        sessionGoalNote: document.getElementById("sessionGoalNote"),
        settingsForm: document.getElementById("settingsForm"),
        focusMinutes: document.getElementById("focusMinutes"),
        breakMinutes: document.getElementById("breakMinutes"),
        longBreakMinutes: document.getElementById("longBreakMinutes"),
        longBreakInterval: document.getElementById("longBreakInterval"),
        dailyGoal: document.getElementById("dailyGoal"),
        autoStartBreak: document.getElementById("autoStartBreak"),
        autoStartFocus: document.getElementById("autoStartFocus"),
        overlayRange: document.getElementById("overlayRange"),
        glassBlurRange: document.getElementById("glassBlurRange"),
        saveState: document.getElementById("saveState"),
        goalText: document.getElementById("goalText"),
        goalBar: document.getElementById("goalBar"),
        logList: document.getElementById("logList"),
        clearLogButton: document.getElementById("clearLogButton"),
        todayDateLabel: document.getElementById("todayDateLabel"),
        backgroundInput: document.getElementById("backgroundInput"),
        backgroundButton: document.getElementById("backgroundButton"),
        clearBackgroundButton: document.getElementById("clearBackgroundButton"),
        toast: document.getElementById("toast")
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function formatTimer(seconds) {
        const safe = Math.max(0, Math.ceil(seconds));
        const min = Math.floor(safe / 60);
        const sec = safe % 60;
        return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }

      function formatDuration(seconds) {
        const safe = Math.max(0, Math.floor(seconds));
        const hours = Math.floor(safe / 3600);
        const minutes = Math.floor((safe % 3600) / 60);
        const secs = safe % 60;

        if (hours > 0) return `${hours}시간 ${minutes}분`;
        if (minutes > 0) return `${minutes}분 ${secs > 0 ? `${secs}초` : ""}`.trim();
        return `${secs}초`;
      }

      function formatStatTime(seconds) {
        const safe = Math.max(0, Math.floor(seconds));
        const hours = Math.floor(safe / 3600);
        const minutes = Math.floor((safe % 3600) / 60);
        if (hours > 0) return `${hours}시간 ${minutes}분`;
        return `${minutes}분`;
      }

      function formatClock(timestamp) {
        return new Intl.DateTimeFormat("ko-KR", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).format(new Date(timestamp));
      }

      function ensureToday() {
        if (state.stats.date !== todayKey()) {
          state.stats = defaultStats();
          state.phase = "focus";
          state.remaining = state.settings.focusMinutes * 60;
          state.isRunning = false;
          state.lastTick = null;
          state.pauseStartedAt = null;
          state.sessionStartedAt = null;
          state.currentSessionActiveSeconds = 0;
          saveState();
        }
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (!saved) return;

          state.settings = { ...defaultSettings, ...(saved.settings || {}) };
          state.stats = saved.stats && saved.stats.date === todayKey()
            ? { ...defaultStats(), ...saved.stats }
            : defaultStats();

          state.phase = ["focus", "break", "longBreak"].includes(saved.phase)
            ? saved.phase
            : "focus";

          const duration = phaseDurations()[state.phase];
          state.remaining = Number.isFinite(saved.remaining)
            ? clamp(saved.remaining, 0, duration)
            : duration;

          state.currentSessionActiveSeconds = Number(saved.currentSessionActiveSeconds) || 0;
          state.sessionStartedAt = saved.sessionStartedAt || null;
          state.pauseStartedAt = saved.pauseStartedAt || null;
          state.isRunning = Boolean(saved.isRunning);
          state.lastTick = saved.lastTick || Date.now();

          if (state.isRunning) {
            const elapsed = Math.max(0, Math.floor((Date.now() - state.lastTick) / 1000));
            applyElapsed(elapsed, false);
            state.lastTick = Date.now();
          }
        } catch (error) {
          console.warn("저장된 상태를 불러오지 못했습니다.", error);
        }
      }

      function saveState() {
        const payload = {
          settings: state.settings,
          stats: state.stats,
          phase: state.phase,
          remaining: state.remaining,
          isRunning: state.isRunning,
          lastTick: state.lastTick,
          pauseStartedAt: state.pauseStartedAt,
          sessionStartedAt: state.sessionStartedAt,
          currentSessionActiveSeconds: state.currentSessionActiveSeconds
        };

        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        } catch (error) {
          console.warn("상태를 저장하지 못했습니다.", error);
        }
      }

      function updateAccent() {
        const styles = {
          focus: ["#ff5c5c", "#ff8a65"],
          break: ["#54d7a6", "#63b7ff"],
          longBreak: ["#8b7cff", "#d26cff"]
        };
        document.documentElement.style.setProperty("--accent", styles[state.phase][0]);
        document.documentElement.style.setProperty("--accent-2", styles[state.phase][1]);
      }

      function updateTimerUI() {
        const duration = phaseDurations()[state.phase];
        const progress = duration > 0
          ? clamp(((duration - state.remaining) / duration) * 100, 0, 100)
          : 0;

        els.timerDisplay.textContent = formatTimer(state.remaining);
        els.progressBar.style.width = `${progress}%`;
        document.title = `${formatTimer(state.remaining)} · ${phaseNames[state.phase]}`;

        const nextNumber = state.stats.completedSessions + 1;
        els.sessionLabel.textContent = state.phase === "focus"
          ? `집중 세션 ${nextNumber}`
          : phaseNames[state.phase];

        els.phaseTabs.forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.phase === state.phase);
        });

        if (state.isRunning) {
          els.startPauseText.textContent = "일시정지";
          els.startPauseIcon.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 7v10M15 7v10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>`;
          els.timerStatus.textContent = state.phase === "focus"
            ? "집중 중입니다. 알림을 잠시 내려놓으세요."
            : "쉬는 중입니다. 몸과 눈을 가볍게 풀어주세요.";
        } else {
          els.startPauseText.textContent = state.remaining < duration ? "계속" : "시작";
          els.startPauseIcon.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 7 8 5-8 5V7Z" fill="currentColor"/>
            </svg>`;

          if (state.pauseStartedAt) {
            els.timerStatus.textContent = "세션이 일시정지되었습니다.";
          } else {
            els.timerStatus.textContent = "준비되면 시작하세요.";
          }
        }

        updateAccent();
      }

      function updateStatsUI() {
        ensureToday();

        const currentPause = state.pauseStartedAt
          ? Math.floor((Date.now() - state.pauseStartedAt) / 1000)
          : 0;

        els.sessionCountValue.textContent = `${state.stats.completedSessions}회`;
        els.focusTimeValue.textContent = formatStatTime(state.stats.focusSeconds);
        els.pauseTimeValue.textContent = formatStatTime(state.stats.pauseSeconds + currentPause);
        els.sessionGoalNote.textContent = `오늘 목표 ${state.settings.dailyGoal}회`;
        els.goalText.textContent = `${state.stats.completedSessions} / ${state.settings.dailyGoal}`;
        els.goalBar.style.width = `${clamp((state.stats.completedSessions / state.settings.dailyGoal) * 100, 0, 100)}%`;
      }

      function updateSettingsUI() {
        els.focusMinutes.value = state.settings.focusMinutes;
        els.breakMinutes.value = state.settings.breakMinutes;
        els.longBreakMinutes.value = state.settings.longBreakMinutes;
        els.longBreakInterval.value = state.settings.longBreakInterval;
        els.dailyGoal.value = state.settings.dailyGoal;
        els.autoStartBreak.checked = state.settings.autoStartBreak;
        els.autoStartFocus.checked = state.settings.autoStartFocus;
        els.overlayRange.value = state.settings.overlay;
        els.glassBlurRange.value = state.settings.glassBlur;
        document.documentElement.style.setProperty("--overlay", state.settings.overlay / 100);
        document.documentElement.style.setProperty(
          "--glass-blur",
          `${state.settings.glassBlur}px`
        );
      }

      function updateDateLabel() {
        els.todayDateLabel.textContent = new Intl.DateTimeFormat("ko-KR", {
          month: "long",
          day: "numeric",
          weekday: "short"
        }).format(new Date());
      }

      function renderLogs() {
        const logs = [...state.stats.logs].reverse();

        if (logs.length === 0) {
          els.logList.innerHTML = `
            <div class="empty-state">
              <div>
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M6 4h12a2 2 0 0 1 2 2v14H4V6a2 2 0 0 1 2-2ZM8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
                <p>아직 기록된 세션이 없습니다.<br />첫 집중 세션을 시작해보세요.</p>
              </div>
            </div>`;
          return;
        }

        els.logList.innerHTML = logs.map((log, reverseIndex) => {
          const originalIndex = state.stats.logs.length - reverseIndex;
          const statusClass = log.status === "완료" ? "complete" : "interrupted";
          const statusText = log.status === "완료" ? "완료" : log.status;
          const timeText = log.endAt
            ? `${formatClock(log.startAt)}–${formatClock(log.endAt)}`
            : formatClock(log.startAt);

          return `
            <article class="log-item">
              <div class="log-index">${String(originalIndex).padStart(2, "0")}</div>
              <div class="log-main">
                <p class="log-title">
                  집중 세션
                  <span class="badge ${statusClass}">${statusText}</span>
                </p>
                <p class="log-meta">${timeText}</p>
              </div>
              <div class="log-duration">${formatDuration(log.durationSeconds)}</div>
            </article>`;
        }).join("");
      }

      function renderAll() {
        updateTimerUI();
        updateStatsUI();
        updateSettingsUI();
        updateDateLabel();
        renderLogs();
      }

      function beginPause() {
        if (!state.pauseStartedAt && state.sessionStartedAt) {
          state.pauseStartedAt = Date.now();
        }
      }

      function endPause() {
        if (state.pauseStartedAt) {
          state.stats.pauseSeconds += Math.max(
            0,
            Math.floor((Date.now() - state.pauseStartedAt) / 1000)
          );
          state.pauseStartedAt = null;
        }
      }

      function startTimer() {
        ensureToday();
        endPause();

        if (!state.sessionStartedAt) {
          state.sessionStartedAt = Date.now();
        }

        state.isRunning = true;
        state.lastTick = Date.now();
        updateTimerUI();
        saveState();
      }

      function pauseTimer() {
        if (!state.isRunning) return;
        syncTick();
        state.isRunning = false;
        beginPause();
        updateTimerUI();
        updateStatsUI();
        saveState();
      }

      function toggleTimer() {
        state.isRunning ? pauseTimer() : startTimer();
      }

      function applyElapsed(elapsed, allowComplete = true) {
        if (elapsed <= 0 || !state.isRunning) return;

        const consumed = Math.min(elapsed, state.remaining);
        state.remaining -= consumed;

        if (state.phase === "focus") {
          state.stats.focusSeconds += consumed;
          state.currentSessionActiveSeconds += consumed;
        }

        if (state.remaining <= 0 && allowComplete) {
          completePhase();
        }
      }

      function syncTick() {
        if (!state.isRunning) return;
        const now = Date.now();
        const elapsed = Math.max(0, Math.floor((now - state.lastTick) / 1000));

        if (elapsed > 0) {
          state.lastTick += elapsed * 1000;
          applyElapsed(elapsed, true);
          updateTimerUI();
          updateStatsUI();
          saveState();
        }
      }

      function chooseNextPhaseAfterFocus() {
        return state.stats.completedSessions % state.settings.longBreakInterval === 0
          ? "longBreak"
          : "break";
      }

      function addFocusLog(status) {
        if (!state.sessionStartedAt || state.currentSessionActiveSeconds <= 0) return;

        state.stats.logs.push({
          startAt: state.sessionStartedAt,
          endAt: Date.now(),
          durationSeconds: state.currentSessionActiveSeconds,
          status
        });

        if (state.stats.logs.length > 50) {
          state.stats.logs = state.stats.logs.slice(-50);
        }
      }

      function completePhase() {
        state.isRunning = false;
        endPause();

        const completedPhase = state.phase;

        if (completedPhase === "focus") {
          state.stats.completedSessions += 1;
          addFocusLog("완료");
          notify("집중 세션을 완료했습니다.");
          state.phase = chooseNextPhaseAfterFocus();
        } else {
          notify("휴식이 끝났습니다. 다시 집중해볼까요?");
          state.phase = "focus";
        }

        state.remaining = phaseDurations()[state.phase];
        state.lastTick = null;
        state.pauseStartedAt = null;
        state.sessionStartedAt = null;
        state.currentSessionActiveSeconds = 0;

        const shouldAutoStart =
          (state.phase === "focus" && state.settings.autoStartFocus) ||
          (state.phase !== "focus" && state.settings.autoStartBreak);

        if (shouldAutoStart) {
          startTimer();
        } else {
          renderAll();
          saveState();
        }
      }

      function resetCurrentSession() {
        syncTick();
        endPause();

        if (state.phase === "focus" && state.currentSessionActiveSeconds >= 1) {
          addFocusLog("중단");
        }

        state.isRunning = false;
        state.remaining = phaseDurations()[state.phase];
        state.lastTick = null;
        state.pauseStartedAt = null;
        state.sessionStartedAt = null;
        state.currentSessionActiveSeconds = 0;
        renderAll();
        saveState();
        notify("현재 세션을 초기화했습니다.");
      }

      function skipCurrentSession() {
        syncTick();
        endPause();

        if (state.phase === "focus") {
          if (state.currentSessionActiveSeconds >= 1) {
            addFocusLog("건너뜀");
          }
          state.phase = state.stats.completedSessions > 0 &&
            state.stats.completedSessions % state.settings.longBreakInterval === 0
            ? "longBreak"
            : "break";
        } else {
          state.phase = "focus";
        }

        state.isRunning = false;
        state.remaining = phaseDurations()[state.phase];
        state.lastTick = null;
        state.pauseStartedAt = null;
        state.sessionStartedAt = null;
        state.currentSessionActiveSeconds = 0;
        renderAll();
        saveState();
      }

      function switchPhase(nextPhase) {
        if (nextPhase === state.phase) return;

        syncTick();
        endPause();

        if (state.phase === "focus" && state.currentSessionActiveSeconds >= 1) {
          addFocusLog("중단");
        }

        state.phase = nextPhase;
        state.isRunning = false;
        state.remaining = phaseDurations()[nextPhase];
        state.lastTick = null;
        state.pauseStartedAt = null;
        state.sessionStartedAt = null;
        state.currentSessionActiveSeconds = 0;
        renderAll();
        saveState();
      }

      function validateNumber(input, fallback, min, max) {
        const value = Number(input.value);
        return Number.isFinite(value) ? clamp(Math.round(value), min, max) : fallback;
      }

      function saveSettings(event) {
        event.preventDefault();

        const oldDuration = phaseDurations()[state.phase];
        const wasFresh = state.remaining === oldDuration && !state.sessionStartedAt;

        state.settings = {
          focusMinutes: validateNumber(els.focusMinutes, 25, 1, 180),
          breakMinutes: validateNumber(els.breakMinutes, 5, 1, 60),
          longBreakMinutes: validateNumber(els.longBreakMinutes, 15, 1, 120),
          longBreakInterval: validateNumber(els.longBreakInterval, 4, 2, 12),
          dailyGoal: validateNumber(els.dailyGoal, 8, 1, 30),
          autoStartBreak: els.autoStartBreak.checked,
          autoStartFocus: els.autoStartFocus.checked,
          overlay: validateNumber(els.overlayRange, 38, 10, 75),
          glassBlur: validateNumber(els.glassBlurRange, 18, 0, 40)
        };

        if (wasFresh) {
          state.remaining = phaseDurations()[state.phase];
        } else {
          state.remaining = Math.min(state.remaining, phaseDurations()[state.phase]);
        }

        document.documentElement.style.setProperty("--overlay", state.settings.overlay / 100);
        document.documentElement.style.setProperty(
          "--glass-blur",
          `${state.settings.glassBlur}px`
        );
        renderAll();
        saveState();

        els.saveState.classList.add("show");
        window.setTimeout(() => els.saveState.classList.remove("show"), 1400);
      }

      function clearLogs() {
        state.stats.logs = [];
        renderLogs();
        saveState();
        notify("오늘의 세션 로그를 비웠습니다.");
      }

      function notify(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(notify.timer);
        notify.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);

        if ("Notification" in window && Notification.permission === "granted") {
          try {
            new Notification("Focus", { body: message });
          } catch (_) {}
        }
      }

      async function requestNotificationPermission() {
        if (!("Notification" in window)) return;
        if (Notification.permission === "default") {
          try {
            await Notification.requestPermission();
          } catch (_) {}
        }
      }

      function applyBackground(dataUrl, persist = true) {
        document.body.style.backgroundImage =
          `linear-gradient(145deg, rgba(17,24,39,.10), rgba(8,10,17,.18)), url("${dataUrl}")`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        els.clearBackgroundButton.classList.remove("hidden");

        if (persist) {
          try {
            localStorage.setItem(BG_KEY, dataUrl);
          } catch (error) {
            notify("이미지가 커서 이번 창에서만 적용됩니다.");
          }
        }
      }

      function loadBackground() {
        try {
          const savedBackground = localStorage.getItem(BG_KEY);
          if (savedBackground) applyBackground(savedBackground, false);
        } catch (_) {}
      }

      function clearBackground() {
        document.body.style.backgroundImage = "";
        document.body.style.backgroundSize = "";
        document.body.style.backgroundPosition = "";
        els.clearBackgroundButton.classList.add("hidden");
        localStorage.removeItem(BG_KEY);
        els.backgroundInput.value = "";
        notify("기본 배경으로 돌아왔습니다.");
      }

      function handleBackgroundFile(file) {
        if (!file || !file.type.startsWith("image/")) {
          notify("이미지 파일을 선택해주세요.");
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          applyBackground(reader.result, file.size <= 3.5 * 1024 * 1024);
          if (file.size > 3.5 * 1024 * 1024) {
            notify("배경을 적용했습니다. 큰 이미지는 새로고침 후 유지되지 않을 수 있습니다.");
          } else {
            notify("배경 이미지를 적용했습니다.");
          }
        };
        reader.readAsDataURL(file);
      }

      els.startPauseButton.addEventListener("click", async () => {
        await requestNotificationPermission();
        toggleTimer();
      });

      els.resetButton.addEventListener("click", resetCurrentSession);
      els.skipButton.addEventListener("click", skipCurrentSession);

      els.phaseTabs.forEach((tab) => {
        tab.addEventListener("click", () => switchPhase(tab.dataset.phase));
      });

      els.settingsForm.addEventListener("submit", saveSettings);

      els.overlayRange.addEventListener("input", () => {
        const overlay = validateNumber(els.overlayRange, 38, 10, 75);
        state.settings.overlay = overlay;
        document.documentElement.style.setProperty(
          "--overlay",
          overlay / 100
        );
        saveState();
      });

      els.glassBlurRange.addEventListener("input", () => {
        const glassBlur = validateNumber(els.glassBlurRange, 18, 0, 40);
        state.settings.glassBlur = glassBlur;
        document.documentElement.style.setProperty(
          "--glass-blur",
          `${glassBlur}px`
        );
        saveState();
      });

      els.clearLogButton.addEventListener("click", clearLogs);
      els.backgroundButton.addEventListener("click", () => els.backgroundInput.click());
      els.backgroundInput.addEventListener("change", (event) => {
        handleBackgroundFile(event.target.files?.[0]);
      });
      els.clearBackgroundButton.addEventListener("click", clearBackground);

      document.addEventListener("keydown", (event) => {
        const tag = document.activeElement?.tagName?.toLowerCase();
        const isTyping = tag === "input" || tag === "textarea" || tag === "select";

        if (!isTyping && event.code === "Space") {
          event.preventDefault();
          toggleTimer();
        }

        if (!isTyping && event.key.toLowerCase() === "r") {
          resetCurrentSession();
        }
      });

      window.addEventListener("beforeunload", () => {
        syncTick();
        saveState();
      });

      loadState();
      ensureToday();
      loadBackground();
      renderAll();

      state.timerId = window.setInterval(() => {
        ensureToday();
        syncTick();
        updateStatsUI();
      }, 250);
    })();
  </script>
</body>
</html>
